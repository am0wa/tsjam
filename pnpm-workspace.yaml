packages:
  - packages/*

allowBuilds:
  '@swc/core': true
  unrs-resolver: true

catalog:
  # tooling API (typescript-eslint, typedoc) — they don't support TS 7 native yet
  typescript: ^6.0.3
  # TS 7 native compiler, aliased as `typescript7` so it doesn't hijack the tooling's `typescript` peer resolution
  typescript7: npm:typescript@~7.0.2
  tslib: 2.8.1

catalogs:
  # Build / compile toolchain + task runners
  tools:
    rimraf: 6.1.3
  # Linting, formatting & the commit-time quality gate
  lint:
    eslint: ^10.6.0
    eslint-config-prettier: ^10.1.8
    typescript-eslint: ^8.63.0
    husky: ^9.1.7
    lint-staged: ^17.0.8
    prettier: ^3.8.4
  # Test runner & test config  
  jest:
    '@swc/jest': ^0.2.39
    '@types/jest': ^30.0.0
    jest: ^30.4.2
    jest-config: ^30.4.2
    jest-environment-jsdom: ^30.4.1
    ts-jest-resolver: ^2.0.1
  swc:
    '@swc/core': ^1.15.33

ignoredBuiltDependencies:
  - '@swc/core'
